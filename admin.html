<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Designs by OVKB</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDY_HmNfD_QFLI7Vwj39s1b3WHKEKD80nQ",
        authDomain: "ovkb-8d398.firebaseapp.com",
        projectId: "ovkb-8d398",
        storageBucket: "ovkb-8d398.firebasestorage.app",
        messagingSenderId: "804850492300",
        appId: "1:804850492300:web:cf90f3c83773e1f13caca9"
      };
      if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
      }
      window.db = firebase.firestore();
    </script>
</head>
<body class="bg-dark text-white">
    <!-- Admin Login Overlay -->
    <div id="admin-login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--background); z-index: 9999; display: flex; justify-content: center; align-items: center;">
        <div class="card border-0 shadow-lg rounded-4 p-5 text-center" style="background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border) !important; max-width: 400px; width: 90%;">
            <h2 class="h4 fw-bold mb-4">Admin Access</h2>
            <form id="admin-login-form">
                <input type="password" id="admin-password" class="form-control text-center mb-4" placeholder="Enter Password" required>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Login</button>
            </form>
            <p id="login-error" class="text-danger mt-3 mb-0" style="display: none;">Incorrect password.</p>
        </div>
    </div>
    
    <div id="admin-main-content" style="display: none;">
        <div class="container py-5">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h1 class="fw-bold h2">Admin Dashboard</h1>
                <span id="status-text" class="badge bg-primary px-3 py-2">Syncing...</span>
            </div>

            <div class="row g-4">
                <!-- Category Management -->
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm rounded-4 p-4 bg-dark-subtle text-white">
                        <h2 class="h5 fw-bold mb-4">Manage Categories</h2>
                        <form id="category-form" class="mb-4">
                            <div class="mb-3">
                                <label class="form-label">Category Name</label>
                                <input type="text" id="cat-name" class="form-control" placeholder="e.g. Greeting Cards" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill">Add Category</button>
                        </form>
                        <div id="cat-list" class="list-group list-group-flush bg-transparent"></div>
                    </div>
                </div>

                <!-- Sub-category Management -->
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm rounded-4 p-4 bg-dark-subtle text-white">
                        <h2 class="h5 fw-bold mb-4">Manage Sub-categories</h2>
                        <form id="sub-category-form" class="mb-4">
                            <div class="mb-3">
                                <label class="form-label">Parent Category</label>
                                <select id="sub-cat-parent" class="form-select" required></select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Sub-category Name</label>
                                <input type="text" id="sub-cat-name" class="form-control" placeholder="e.g. Birthday" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill">Add Sub-category</button>
                        </form>
                        <div id="sub-cat-list" class="list-group list-group-flush bg-transparent"></div>
                    </div>
                </div>

                <!-- Graphic Management -->
                <div class="col-12">
                    <div class="card border-0 shadow-sm rounded-4 p-4 bg-dark-subtle text-white">
                        <h2 class="h5 fw-bold mb-4">Upload New Graphic</h2>
                        <form id="graphic-form" class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Sub-category</label>
                                <select id="graphic-sub-cat" class="form-select" required></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Design Title</label>
                                <input type="text" id="graphic-title" class="form-control" placeholder="e.g. Floral Greeting" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Image File</label>
                                <input type="file" id="graphic-file" class="form-control" accept="image/*" required>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">Upload & Save Design</button>
                            </div>
                        </form>

                        <hr class="my-5 border-secondary">
                        
                        <h3 class="h5 fw-bold mb-4">Current Portfolio</h3>
                        <div id="admin-graphics-list" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>
                    </div>
                </div>

                <!-- Animation Management -->
                <div class="col-12">
                    <div class="card border-0 shadow-sm rounded-4 p-4 bg-dark-subtle text-white">
                        <h2 class="h5 fw-bold mb-4">Manage Animations</h2>
                        <form id="animation-form" class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Category</label>
                                <select id="anim-cat" class="form-select" required></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Sub-category</label>
                                <select id="anim-sub-cat" class="form-select" required></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Title</label>
                                <input type="text" id="anim-title" class="form-control" placeholder="e.g. Birthday Special" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">YouTube URL</label>
                                <input type="text" id="anim-url" class="form-control" placeholder="URL here" required>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">Add Animation</button>
                            </div>
                        </form>
                        
                        <div class="table-responsive mt-4">
                            <table class="table table-dark table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Type</th>
                                        <th>Preview</th>
                                        <th class="text-end">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="anim-list-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Graphic Modal -->
    <div class="modal fade" id="editGraphicModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white rounded-4 border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Edit Graphic</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-graphic-form">
                        <input type="hidden" id="edit-graphic-id">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" id="edit-graphic-title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sub-category</label>
                            <select id="edit-graphic-sub-cat" class="form-select" required></select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple Login Logic
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (document.getElementById('admin-password').value === '1948') {
                document.getElementById('admin-login-overlay').style.display = 'none';
                document.getElementById('admin-main-content').style.display = 'block';
                sessionStorage.setItem('admin_auth', 'true');
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        });
        if (sessionStorage.getItem('admin_auth') === 'true') {
            document.getElementById('admin-login-overlay').style.display = 'none';
            document.getElementById('admin-main-content').style.display = 'block';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
