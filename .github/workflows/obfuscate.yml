name: Obfuscate and Clean URLs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools 🛠️
        run: |
          npm install -g javascript-obfuscator html-minifier-terser clean-css-cli

      - name: Process Files 🔒
        run: |
          # 1. URL එක පිරිසිදු කරන Script එකක් හැම HTML එකකටම ඇතුළත් කිරීම (Google file එක හැර)
          # මේකෙන් .html සහ /index කියන කෑලි URL එකෙන් අයින් කරනවා
          CLEAN_URL_SCRIPT='<script>if(window.location.pathname.endsWith(".html")||window.location.pathname.endsWith("/index")){let c=window.location.pathname.replace(/\.html$/,"").replace(/\/index$/,"/");window.history.replaceState(null,"",c+window.location.search+window.location.hash)}</script>'
          
          find . -type f -name "*.html" ! -name "googlec139648909f99a98.html" -exec sed -i "s|<\/head>|${CLEAN_URL_SCRIPT}<\/head>|g" {} \;

          # 2. JS files obfuscate කිරීම
          find . -type f -name "*.js" -exec javascript-obfuscator {} --output {} \;

          # 3. CSS files minify කිරීම
          find . -type f -name "*.css" -exec cleancss -o {} {} \;

          # 4. HTML files minify කිරීම (Google file එක හැර)
          find . -type f -name "*.html" ! -name "googlec139648909f99a98.html" -exec html-minifier-terser --collapse-whitespace --remove-comments --minify-js true --minify-css true -o {} {} \;

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
