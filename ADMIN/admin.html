    <!-- Firebase Logic for Animations -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const animForm = document.getElementById('animation-form');
            const animListTbody = document.getElementById('anim-list-tbody');
            const animCatDropdown = document.getElementById('anim-cat');
            const animSubCatDropdown = document.getElementById('anim-sub-cat');

            function getYoutubeID(url) {
                // Handle iframe strings
                if (url.includes('<iframe')) {
                    const srcMatch = url.match(/src=["']([^"']+)["']/);
                    if (srcMatch) url = srcMatch[1];
                }
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            }

            // Add Animation
            if (animForm) {
                animForm.onsubmit = async (e) => {
                    e.preventDefault();
                    const title = document.getElementById('anim-title').value;
                    const url = document.getElementById('anim-url').value;
                    const categoryId = animCatDropdown.value;
                    const subCategoryId = animSubCatDropdown.value;
                    const youtubeId = getYoutubeID(url);

                    if (!youtubeId) return alert("Invalid YouTube URL");

                    try {
                        await db.collection("animations").add({
                            title,
                            youtubeId,
                            url,
                            categoryId,
                            subCategoryId,
                            type: "Animations",
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("Animation added successfully!");
                        animForm.reset();
                    } catch (err) {
                        console.error(err);
                        alert("Error adding animation: " + err.message);
                    }
                };
            }

            let localAnims = {}; // To store animation data safely
            if (animListTbody) {
                db.collection("animations").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                    animListTbody.innerHTML = '';
                    localAnims = {}; 
                    snapshot.forEach((docSnap) => {
                        const anim = docSnap.data();
                        localAnims[docSnap.id] = anim; // Save to local state
                        const tr = document.createElement('tr');
                        tr.id = `row-${docSnap.id}`;
                        tr.innerHTML = `
                            <td class="fw-bold" style="vertical-align: middle;">${anim.title}</td>
                            <td style="vertical-align: middle;"><span class="badge bg-light text-dark">${anim.type}</span></td>
                            <td style="vertical-align: middle;">
                                <iframe width="160" height="90" src="https://www.youtube.com/embed/${anim.youtubeId}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                            </td>
                            <td class="text-end" style="vertical-align: middle;">
                                <button class="btn btn-sm btn-outline-primary rounded-pill px-3 me-2" onclick="openEditAnimModal('${docSnap.id}')">Edit</button>
                                <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="deleteAnimation('${docSnap.id}')">Delete</button>
                            </td>
                        `;
                        animListTbody.appendChild(tr);
                    });
                });
            }

            window.deleteAnimation = async (id) => {
                if (confirm("Delete this animation?")) {
                    await db.collection("animations").doc(id).delete();
                }
            };

            const editAnimModal = new bootstrap.Modal(document.getElementById('editAnimModal'));
            const editAnimForm = document.getElementById('edit-anim-form');

            window.openEditAnimModal = (id) => {
                const anim = localAnims[id];
                if (!anim) return;
                document.getElementById('edit-anim-id').value = id;
                document.getElementById('edit-anim-title').value = anim.title;
                document.getElementById('edit-anim-url').value = anim.url;
                editAnimModal.show();
            };

            editAnimForm.onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-anim-id').value;
                const title = document.getElementById('edit-anim-title').value;
                const url = document.getElementById('edit-anim-url').value;
                const youtubeId = getYoutubeID(url);

                if (!youtubeId) return alert("Invalid YouTube URL");

                try {
                    await db.collection("animations").doc(id).update({
                        title,
                        url,
                        youtubeId
                    });
                    editAnimModal.hide();
                    alert("Animation updated successfully!");
                } catch (err) {
                    console.error(err);
                    alert("Error updating: " + err.message);
                }
            };
        });
    </script>

    <!-- Edit Animation Modal -->
