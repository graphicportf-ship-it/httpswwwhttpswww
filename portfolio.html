<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
    <title>Portfolio | Designs by OVKB</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a href="index.html" class="navbar-brand logo">OVKB</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-lg-4 align-items-center">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                    <li class="nav-item"><a href="portfolio.html" class="nav-link active">Portfolio</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
                    <li class="nav-item"><a href="contact.html" class="btn btn-primary rounded-pill px-4 ms-lg-2">Start a Project</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <div class="row align-items-center gy-5">
                <div class="col-lg-6">
                    <h1>Our Creations</h1>
                    <p>A collection of thoughtful designs for meaningful moments. Each piece is crafted with sincerity and care.</p>
                </div>
                <div class="col-lg-6">
                    <img src="hero.png" alt="Portfolio" class="img-fluid rounded-4 shadow-lg">
                </div>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="portfolio-filters mb-5">
                <div class="filter-group-main mb-4 text-center">
                    <div id="main-filter">
                        <!-- 'All Categories' button goes here -->
                    </div>
                </div>
                <div class="filter-group-categories mb-3 d-flex flex-wrap justify-content-center gap-2" id="category-filters">
                    <!-- Categories loaded via JS -->
                </div>
                <div class="filter-group-sub d-flex flex-wrap justify-content-center gap-2" id="sub-category-filters">
                    <!-- Sub-categories loaded via JS -->
                </div>
            </div>

            <div id="graphics-grid" class="graphics-grid">
                <div class="col-12 text-center text-muted">Sincerity takes time... loading designs.</div>
            </div>
        </div>
    </section>

    <footer class="footer py-5">
        <div class="container text-center">
            <p class="copyright mb-0">&copy; 2026 Designs by OVKB. Crafted with sincerity.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
